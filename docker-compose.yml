services:
  db_volkswagen:
    image: postgres:latest
    container_name: vw_postgres_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=Postgres123
      - POSTGRES_DB=postgres
    volumes:
      - ./db-init:/docker-entrypoint-initdb.d 
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      retries: 5
      timeout: 5s
    networks:
      - vw_network

  api:
    build:
      context: .
      dockerfile: Financiamento.Api/Dockerfile
    depends_on:
      db_volkswagen: 
        condition: service_healthy
    environment:
      # Use o nome do serviço 'db_volkswagen' como Host
      - ConnectionStrings__DB_Volkswagen=Host=db_volkswagen;Port=5432;Database=postgres;Username=postgres;Password=Postgres123;SearchPath=volkswagen
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
    ports:
      - "5000:80"
    networks:
      - vw_network

volumes:
  pgdata:

networks:
  vw_network:
    driver: bridge